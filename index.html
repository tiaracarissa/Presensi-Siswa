        // ==========================================
        // 2. KOMPONEN UTAMA (APP)
        // ==========================================
        function App() {
            const [logs, setLogs] = useState([]);
            const [activeTab, setActiveTab] = useState('kiosk');

            return (
                <div className="flex flex-col min-h-screen">

                    <header className="bg-blue-700 text-white shadow-md z-10 relative">

        // ==========================================
        // 3. TAB KIOSK (SISWA)
        // ==========================================
        function KioskPortal({ logs, setLogs }) {
            const [inputMode, setInputMode] = useState('scanner'); // 'scanner' atau 'camera'
            const [scanStatus, setScanStatus] = useState('waiting'); // 'waiting', 'success', 'error'
            const [scanData, setScanData] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [nisInput, setNisInput] = useState('');
            const [currentTime, setCurrentTime] = useState(new Date());
            
            const inputRef = useRef(null);
            const scannerRef = useRef(null);

            // Update Jam Real-time
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Helper format tanggal
            const getTodayDateString = () => {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            };

            const hasAttendedToday = (nis) => {
                const today = getTodayDateString();
                return logs.some(log => log.nis === nis && log.date === today && (log.status === 'Hadir' || log.status === 'Terlambat'));
            };

            // LOGIKA UTAMA PRESENSI
            const processNis = (scannedNis) => {
                const cleanNis = scannedNis.trim();
                const student = STUDENTS.find(s => s.nis === cleanNis);

                if (!student) {
                    triggerError(`Siswa dengan NIS ${cleanNis} tidak terdaftar!`);
                    return;
                }

                if (hasAttendedToday(student.nis)) {
                    triggerError(`Presensi Ditolak: ${student.name} sudah tercatat hari ini.`);
                    return;
                }

                // Cek Jam Kehadiran
                const now = new Date();
                const currentHrs = now.getHours() * 60 + now.getMinutes();
                const [startH, startM] = CONFIG.startTime.split(':').map(Number);
                const [lateH, lateM] = CONFIG.lateTime.split(':').map(Number);
                const [endH, endM] = CONFIG.endTime.split(':').map(Number);

                const startMins = startH * 60 + startM;
                const lateMins = lateH * 60 + lateM;
                const endMins = endH * 60 + endM;

                if (currentHrs < startMins || currentHrs > endMins) {
                    triggerError(`Mesin ditutup. Beroperasi jam ${CONFIG.startTime} - ${CONFIG.endTime} WIB.`);
                    return;
                }

                // Tentukan Status Hadir/Terlambat
                const statusHadir = currentHrs >= lateMins ? "Terlambat" : "Hadir";
                
                const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const dateStr = getTodayDateString();

                const newLog = {
                    id: Date.now(),
                    nis: student.nis,
                    name: student.name,
                    kelas: student.kelas,
                    date: dateStr,
                    time: timeStr,
                    timestamp: now.toISOString(),
                    location: "Kiosk Utama",
                    status: statusHadir
                };

                // Simpan ke State (dan LocalStorage)
                setLogs(prev => [newLog, ...prev]);

                // Kirim ke Google Sheets
                if (CONFIG.googleSheetUrl && CONFIG.googleSheetUrl.includes("script.google.com")) {
                    fetch(CONFIG.googleSheetUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newLog)
                    }).catch(err => console.error("Gagal ke server", err));
                }

                // Tampilkan Sukses
                setScanData({ student, time: timeStr, status: statusHadir });
                setScanStatus('success');
            };

            const triggerError = (msg) => {
                setErrorMsg(msg);
                setScanStatus('error');
            };

            // Auto Reset Layar Pop-up
            useEffect(() => {
                if (scanStatus === 'success' || scanStatus === 'error') {
                    const timer = setTimeout(() => {
                        setScanStatus('waiting');
                        setScanData(null);
                        setErrorMsg('');
                        setNisInput('');
                    }, 4000); // Tampil 4 detik
                    return () => clearTimeout(timer);
                }
            }, [scanStatus]);

            // Fokus otomatis untuk Scanner USB (Mode Tersembunyi)
            useEffect(() => {
                if (inputMode === 'scanner' && scanStatus === 'waiting' && inputRef.current) {
                    inputRef.current.focus();
                }
            }, [inputMode, scanStatus]);

            // Setup Webcam Scanner
            useEffect(() => {
                let html5QrcodeScanner = null;

                if (inputMode === 'camera' && scanStatus === 'waiting') {
                    const startScanner = () => {
                        if (window.Html5QrcodeScanner && document.getElementById("reader")) {
                            html5QrcodeScanner = new window.Html5QrcodeScanner(
                                "reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false
                            );
                            html5QrcodeScanner.render(
                                (decodedText) => {
                                    if (html5QrcodeScanner) html5QrcodeScanner.clear();
                                    processNis(decodedText);
                                },
                                (err) => { /* abaikan error scanning frame */ }
                            );
                        }
                    };
                    
                    // Beri jeda agar DOM render
                    setTimeout(() => {
                        if (window.Html5QrcodeScanner) startScanner();
                    }, 300);
                }

                return () => {
                    if (html5QrcodeScanner) {
                        html5QrcodeScanner.clear().catch(e => console.log(e));
                    }
                };
            }, [inputMode, scanStatus]);

            return (
                <div className="max-w-lg mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100 relative">
                    
                    {/* LAYAR: STANDBY / MENUNGGU */}
                    {scanStatus === 'waiting' && (
                        <div className="p-8">
                            <div className="text-center mb-6">
                                {/* LOGO BESAR: Di Tengah Layar Standby di atas Jam */}
                                <img 
                                    src="LogoSMA.png" 
                                    alt="Logo Sekolah" 
                                    className="w-32 h-32 object-contain drop-shadow-xl mx-auto mb-4"
                                    onError={(e) => { e.target.style.display = 'none'; }}
                                />
                                
                                <h2 className="text-2xl font-black text-gray-800 tracking-tight">MESIN PRESENSI</h2>
                                
                                {/* JAM DIGITAL */}
                                <div className="text-5xl font-mono font-black text-blue-600 mt-2 drop-shadow-sm tracking-widest">
                                    {currentTime.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                </div>
                            </div>

                            {/* Pilihan Mode */}
                            <div className="flex bg-gray-100 p-1 rounded-xl mb-6 shadow-inner">
                                <button 
                                    onClick={() => setInputMode('scanner')} 
                                    className={`flex-1 flex justify-center items-center gap-2 py-3 text-sm font-bold rounded-lg transition-all ${inputMode === 'scanner' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    <i className="fa-solid fa-barcode text-lg"></i> Scanner Alat
                                </button>
                                <button 
                                    onClick={() => setInputMode('camera')} 
                                    className={`flex-1 flex justify-center items-center gap-2 py-3 text-sm font-bold rounded-lg transition-all ${inputMode === 'camera' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    <i className="fa-solid fa-camera text-lg"></i> Webcam
                                </button>
                            </div>

                            {/* AREA PEMINDAIAN */}
                            {inputMode === 'scanner' ? (
                                <div 
                                    className="bg-blue-50/70 border-2 border-blue-300 border-dashed rounded-2xl p-10 text-center cursor-pointer transition hover:bg-blue-100 group relative"
                                    onClick={() => inputRef.current && inputRef.current.focus()}
                                >
                                    <i className="fa-solid fa-address-card text-blue-400 text-6xl mx-auto mb-4 block group-hover:scale-110 transition-transform duration-300"></i>
                                    <h3 className="text-xl font-bold text-blue-800 mb-1">Tempelkan Kartu Pelajar</h3>
                                    <p className="text-sm text-blue-600 font-medium flex items-center justify-center gap-2">
                                        <span className="w-2.5 h-2.5 bg-blue-500 rounded-full animate-ping"></span>
                                        Menunggu pindaian...
                                    </p>

                                    {/* INPUT TERSEMBUNYI UNTUK KEAMANAN (TIDAK BISA DIKETIK MANUAL OLEH SISWA) */}
                                    <input 
                                        ref={inputRef} 
                                        type="text" 
                                        value={nisInput}
                                        onChange={(e) => {
                                            const val = e.target.value.replace(/\D/g, ''); // Hanya angka
                                            setNisInput(val);
                                            if (val.length >= 5) {
                                                processNis(val.substring(0,5));
                                                setNisInput('');
                                            }
                                        }}
                                        className="opacity-0 absolute w-0 h-0 top-0 left-0" 
                                        autoFocus 
                                        autoComplete="off"
                                    />
                                </div>
                            ) : (
                                <div className="overflow-hidden rounded-2xl border-4 border-gray-200 bg-black relative">
                                    <div id="reader" className="w-full min-h-[300px] bg-white text-black"></div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* LAYAR POP-UP: BERHASIL (Hadir/Terlambat) */}
                    {scanStatus === 'success' && scanData && (
                        <div className="p-10 text-center animate-zoom-in bg-white h-full flex flex-col justify-center items-center">
                            <div className={`p-5 rounded-full mb-6 shadow-xl ${scanData.status === 'Terlambat' ? 'bg-orange-100 text-orange-500' : 'bg-green-100 text-green-500'}`}>
                                <i className={`fa-solid text-7xl ${scanData.status === 'Terlambat' ? 'fa-clock' : 'fa-circle-check'}`}></i>
                            </div>
                            
                            <h2 className="text-3xl font-black text-gray-800 mb-2 leading-tight">{scanData.student.name}</h2>
                            <div className="inline-block px-5 py-1.5 rounded-full font-bold text-gray-700 bg-gray-100 mb-6 text-lg">
                                Kelas {scanData.student.kelas}
                            </div>

                            <div className="w-full bg-gray-50 border border-gray-200 rounded-2xl p-5 shadow-inner">
                                <div className="flex justify-between items-center border-b border-gray-200 pb-3 mb-3">
                                    <span className="text-gray-500 font-semibold">Waktu Rekam</span>
                                    <span className="font-mono font-bold text-xl text-gray-800">{scanData.time}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-gray-500 font-semibold">Status</span>
                                    <span className={`font-black uppercase tracking-widest text-lg ${scanData.status === 'Terlambat' ? 'text-orange-600' : 'text-green-600'}`}>
                                        {scanData.status}
                                    </span>
                                </div>
                            </div>
                            
                            <p className="mt-8 text-gray-400 font-medium animate-pulse text-sm">Menyiapkan pemindaian berikutnya...</p>
                        </div>
                    )}

                    {/* LAYAR POP-UP: DITOLAK/ERROR */}
                    {scanStatus === 'error' && (
                        <div className="p-10 text-center animate-zoom-in bg-white h-full flex flex-col justify-center items-center">
                            <div className="p-5 rounded-full mb-6 bg-red-100 text-red-500 shadow-xl">
                                <i className="fa-solid fa-triangle-exclamation text-7xl"></i>
                            </div>
                            
                            <h2 className="text-4xl font-black text-red-600 mb-4 tracking-tight">DITOLAK</h2>
                            
                            <div className="bg-red-50 border border-red-200 text-red-700 p-5 rounded-2xl w-full text-lg font-bold leading-relaxed shadow-inner">
                                {errorMsg}
                            </div>
                            
                            <p className="mt-8 text-gray-400 font-medium animate-pulse text-sm">Kembali ke layar utama...</p>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 4. TAB ADMIN DASHBOARD
        // ==========================================
        function AdminDashboard({ logs, setLogs }) {
            const [adminTab, setAdminTab] = useState('input'); // 'input', 'daily', 'monthly'
            
            // State Input Manual
            const [manualNis, setManualNis] = useState('');
            const [manualName, setManualName] = useState('');
            const [manualKelas, setManualKelas] = useState('');
            const [manualStatus, setManualStatus] = useState('Sakit');
            const [manualDate, setManualDate] = useState(new Date().toISOString().split('T')[0]);
            const [alertMsg, setAlertMsg] = useState({ type: '', text: '' });

            // State Recap
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));

            // Efek auto-fill nama saat NIS diketik Admin
            useEffect(() => {
                if (manualNis.length >= 5) {
                    const student = STUDENTS.find(s => s.nis === manualNis.substring(0,5));
                    if (student) {
                        setManualName(student.name);
                        setManualKelas(student.kelas);
                    } else {
                        setManualName('Siswa tidak ditemukan');
                        setManualKelas('-');
                    }
                } else {
                    setManualName('');
                    setManualKelas('');
                }
            }, [manualNis]);

            const handleManualSubmit = (e) => {
                e.preventDefault();
                if (manualName === 'Siswa tidak ditemukan' || manualName === '') {
                    setAlertMsg({ type: 'error', text: 'NIS tidak valid!' });
                    setTimeout(() => setAlertMsg({ type:'', text:'' }), 3000);
                    return;
                }

                const newLog = {
                    id: Date.now(),
                    nis: manualNis.substring(0,5),
                    name: manualName,
                    kelas: manualKelas,
                    date: manualDate,
                    time: "-", // Manual tidak ada jam
                    timestamp: new Date().toISOString(),
                    location: "Input Admin",
                    status: manualStatus
                };

                setLogs(prev => [newLog, ...prev]);

                // Kirim ke GS
                if (CONFIG.googleSheetUrl && CONFIG.googleSheetUrl.includes("script.google.com")) {
                    fetch(CONFIG.googleSheetUrl, {
                        method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newLog)
                    }).catch(e => console.log(e));
                }

                setAlertMsg({ type: 'success', text: `Data ${manualStatus} untuk ${manualName} disimpan.` });
                setManualNis('');
                setTimeout(() => setAlertMsg({ type:'', text:'' }), 4000);
            };

            // Fungsi Download CSV
            const downloadCSV = (dataArray, filename) => {
                if (dataArray.length === 0) { alert("Data kosong"); return; }
                const headers = Object.keys(dataArray[0]).join(",");
                const rows = dataArray.map(obj => Object.values(obj).map(val => `"${val}"`).join(","));
                const csvContent = "data:text/csv;charset=utf-8," + headers + "\n" + rows.join("\n");
                
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `${filename}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const getDailyData = () => logs.filter(l => l.date === selectedDate);
            
            const getMonthlyData = () => {
                const monthlyLogs = logs.filter(l => l.date.startsWith(selectedMonth));
                return STUDENTS.map(stu => {
                    const stuLogs = monthlyLogs.filter(l => l.nis === stu.nis);
                    return {
                        ...stu,
                        totalTerlambat: stuLogs.filter(l => l.status === 'Terlambat').length,
                        totalSakit: stuLogs.filter(l => l.status === 'Sakit').length,
                        totalIzin: stuLogs.filter(l => l.status === 'Izin').length,
                        totalAlpha: stuLogs.filter(l => l.status === 'Alpha').length,
                    };
                });
            };

            return (
                <div className="bg-white rounded-3xl shadow-xl p-6 md:p-8 border border-gray-100">
                    {/* Admin Navigation */}
                    <div className="flex border-b-2 border-gray-100 mb-8 overflow-x-auto">
                        <button onClick={() => setAdminTab('input')} className={`px-6 py-4 font-bold text-sm whitespace-nowrap transition-colors relative ${adminTab === 'input' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-700'}`}>
                            <i className="fa-solid fa-pen-to-square mr-2"></i> Input Manual
                            {adminTab === 'input' && <div className="absolute bottom-[-2px] left-0 w-full h-1 bg-blue-600 rounded-t-lg"></div>}
                        </button>
                        <button onClick={() => setAdminTab('daily')} className={`px-6 py-4 font-bold text-sm whitespace-nowrap transition-colors relative ${adminTab === 'daily' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-700'}`}>
                            <i className="fa-solid fa-calendar-day mr-2"></i> Rekap Harian
                            {adminTab === 'daily' && <div className="absolute bottom-[-2px] left-0 w-full h-1 bg-blue-600 rounded-t-lg"></div>}
                        </button>
                        <button onClick={() => setAdminTab('monthly')} className={`px-6 py-4 font-bold text-sm whitespace-nowrap transition-colors relative ${adminTab === 'monthly' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-700'}`}>
                            <i className="fa-solid fa-chart-pie mr-2"></i> Rekap Bulanan
                            {adminTab === 'monthly' && <div className="absolute bottom-[-2px] left-0 w-full h-1 bg-blue-600 rounded-t-lg"></div>}
                        </button>
                    </div>

                    {/* PANEL: INPUT MANUAL */}
                    {adminTab === 'input' && (
                        <div className="max-w-md mx-auto animate-zoom-in">
                            <div className="bg-blue-50 border border-blue-100 rounded-2xl p-6 shadow-sm">
                                <h3 className="text-xl font-black text-blue-900 mb-6 flex items-center gap-2">
                                    <i className="fa-solid fa-clipboard-user"></i> Form Ketidakhadiran
                                </h3>
                                
                                <form onSubmit={handleManualSubmit} className="space-y-5">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">NIS Siswa</label>
                                        <input 
                                            type="number" 
                                            value={manualNis} 
                                            onChange={(e) => setManualNis(e.target.value)} 
                                            className="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                                            placeholder="Ketik 5 digit NIS..."
                                            required 
                                        />
                                    </div>
                                    
                                    <div className={`p-4 rounded-xl border font-bold text-center ${manualName === 'Siswa tidak ditemukan' ? 'bg-red-50 border-red-200 text-red-600' : manualName ? 'bg-white border-gray-200 text-gray-800 shadow-sm' : 'bg-gray-100 border-gray-200 text-gray-400'}`}>
                                        {manualName ? `${manualName} ${manualKelas !== '-' ? `(${manualKelas})` : ''}` : 'Data Otomatis'}
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">Tanggal</label>
                                            <input 
                                                type="date" 
                                                value={manualDate} 
                                                onChange={(e) => setManualDate(e.target.value)} 
                                                className="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none"
                                                required 
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">Status</label>
                                            <select 
                                                value={manualStatus} 
                                                onChange={(e) => setManualStatus(e.target.value)}
                                                className="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none font-bold"
                                            >
                                                <option value="Sakit">Sakit</option>
                                                <option value="Izin">Izin</option>
                                                <option value="Alpha">Alpha</option>
                                            </select>
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 mt-2">
                                        <i className="fa-solid fa-paper-plane"></i> Simpan Data
                                    </button>
                                </form>

                                {alertMsg.text && (
                                    <div className={`mt-4 p-4 rounded-xl text-sm font-bold flex items-center gap-3 animate-zoom-in ${alertMsg.type === 'error' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>
                                        <i className={`fa-solid text-lg ${alertMsg.type === 'error' ? 'fa-circle-xmark' : 'fa-circle-check'}`}></i>
                                        {alertMsg.text}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* PANEL: REKAP HARIAN */}
                    {adminTab === 'daily' && (
                        <div className="animate-zoom-in space-y-4">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-gray-50 p-4 rounded-2xl border border-gray-200 gap-4">
                                <div className="flex items-center gap-3 w-full sm:w-auto">
                                    <label className="font-bold text-gray-600">Pilih Tanggal:</label>
                                    <input 
                                        type="date" 
                                        value={selectedDate} 
                                        onChange={(e) => setSelectedDate(e.target.value)} 
                                        className="p-2 border border-gray-300 rounded-lg font-bold text-blue-800 outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                </div>
                                <button 
                                    onClick={() => downloadCSV(getDailyData().map((l, i) => ({ No: i+1, NIS: "'"+l.nis, Nama: l.name, Kelas: l.kelas, Status: l.status, Jam: l.time })), `Rekap_Harian_${selectedDate}`)}
                                    className="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-lg font-bold shadow transition flex items-center gap-2 w-full sm:w-auto justify-center"
                                >
                                    <i className="fa-solid fa-download"></i> Unduh CSV
                                </button>
                            </div>

                            <div className="overflow-x-auto border border-gray-200 rounded-xl">
                                <table className="w-full text-left border-collapse whitespace-nowrap">
                                    <thead>
                                        <tr className="bg-gray-100 text-gray-600 text-sm">
                                            <th className="p-4 font-bold border-b">NIS</th>
                                            <th className="p-4 font-bold border-b">Nama Siswa</th>
                                            <th className="p-4 font-bold border-b text-center">Kelas</th>
                                            <th className="p-4 font-bold border-b text-center">Status</th>
                                            <th className="p-4 font-bold border-b text-center">Jam</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm">
                                        {getDailyData().length === 0 ? (
                                            <tr><td colSpan="5" className="p-8 text-center text-gray-400 font-medium italic">Tidak ada presensi pada tanggal ini.</td></tr>
                                        ) : (
                                            getDailyData().map(log => (
                                                <tr key={log.id} className="hover:bg-blue-50 transition border-b border-gray-100">
                                                    <td className="p-4 font-mono text-gray-500">{log.nis}</td>
                                                    <td className="p-4 font-bold text-gray-800">{log.name}</td>
                                                    <td className="p-4 text-center font-medium text-gray-600">{log.kelas}</td>
                                                    <td className="p-4 text-center">
                                                        <span className={`px-3 py-1 rounded-md text-xs font-bold uppercase tracking-wider
                                                            ${log.status === 'Hadir' ? 'bg-green-100 text-green-700' : 
                                                              log.status === 'Terlambat' ? 'bg-orange-100 text-orange-700' : 
                                                              log.status === 'Sakit' ? 'bg-yellow-100 text-yellow-700' : 
                                                              log.status === 'Izin' ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'}`}
                                                        >
                                                            {log.status}
                                                        </span>
                                                    </td>
                                                    <td className="p-4 text-center font-bold text-gray-600">{log.time}</td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* PANEL: REKAP BULANAN */}
                    {adminTab === 'monthly' && (
                        <div className="animate-zoom-in space-y-4">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-gray-50 p-4 rounded-2xl border border-gray-200 gap-4">
                                <div className="flex items-center gap-3 w-full sm:w-auto">
                                    <label className="font-bold text-gray-600">Pilih Bulan:</label>
                                    <input 
                                        type="month" 
                                        value={selectedMonth} 
                                        onChange={(e) => setSelectedMonth(e.target.value)} 
                                        className="p-2 border border-gray-300 rounded-lg font-bold text-blue-800 outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                </div>
                                <button 
                                    onClick={() => downloadCSV(getMonthlyData().map((s, i) => ({ No: i+1, NIS: "'"+s.nis, Nama: s.name, Kelas: s.kelas, Terlambat: s.totalTerlambat, Sakit: s.totalSakit, Izin: s.totalIzin, Alpha: s.totalAlpha })), `Rekap_Bulanan_${selectedMonth}`)}
                                    className="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-lg font-bold shadow transition flex items-center gap-2 w-full sm:w-auto justify-center"
                                >
                                    <i className="fa-solid fa-download"></i> Unduh Rekap CSV
                                </button>
                            </div>

                            <div className="overflow-x-auto border border-gray-200 rounded-xl">
                                <table className="w-full text-left border-collapse whitespace-nowrap">
                                    <thead>
                                        <tr className="bg-gray-100 text-gray-600 text-sm">
                                            <th className="p-4 font-bold border-b">NIS</th>
                                            <th className="p-4 font-bold border-b">Nama Siswa</th>
                                            <th className="p-4 font-bold border-b text-center">Kelas</th>
                                            <th className="p-4 font-bold border-b text-center">Terlambat</th>
                                            <th className="p-4 font-bold border-b text-center">Sakit</th>
                                            <th className="p-4 font-bold border-b text-center">Izin</th>
                                            <th className="p-4 font-bold border-b text-center">Alpha</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm">
                                        {getMonthlyData().map(stu => (
                                            <tr key={stu.nis} className="hover:bg-blue-50 transition border-b border-gray-100">
                                                <td className="p-4 font-mono text-gray-500">{stu.nis}</td>
                                                <td className="p-4 font-bold text-gray-800">{stu.name}</td>
                                                <td className="p-4 text-center font-medium text-gray-600">{stu.kelas}</td>
                                                <td className="p-4 text-center">
                                                    <span className={`inline-block w-8 py-1 rounded text-xs font-black ${stu.totalTerlambat > 0 ? 'bg-orange-500 text-white' : 'text-gray-300'}`}>{stu.totalTerlambat}</span>
                                                </td>
                                                <td className="p-4 text-center">
                                                    <span className={`inline-block w-8 py-1 rounded text-xs font-black ${stu.totalSakit > 0 ? 'bg-yellow-400 text-yellow-900' : 'text-gray-300'}`}>{stu.totalSakit}</span>
                                                </td>
                                                <td className="p-4 text-center">
                                                    <span className={`inline-block w-8 py-1 rounded text-xs font-black ${stu.totalIzin > 0 ? 'bg-blue-500 text-white' : 'text-gray-300'}`}>{stu.totalIzin}</span>
                                                </td>
                                                <td className="p-4 text-center">
                                                    <span className={`inline-block w-8 py-1 rounded text-xs font-black ${stu.totalAlpha > 0 ? 'bg-red-500 text-white' : 'text-gray-300'}`}>{stu.totalAlpha}</span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
